<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>E-Healthcare - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="/static/css/style.css?v=2"
    />
    <style>
      /* Inline critical overrides to ensure visible theme */
      body {
        background: #f4f7f9 !important;
        color: #1f2937 !important;
      }
      nav.navbar .navbar-brand {
        color: #0f172a !important;
        font-weight: 700 !important;
      }
      .display-5 {
        color: #0b1a2b !important;
      }
      .lead {
        color: #475569 !important;
      }
      .btn-primary {
        background-color: #0284c7 !important;
        border: none !important;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">E-Healthcare</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            
            <li class="nav-item">
              <a class="nav-link" href="/login" id="nav-login">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/register" id="nav-register"

              >
            </li>
            
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div id="messages">
          
      </div>

      <div class="row align-items-center">
        <div class="col-md-6">
          <h1 class="display-5">E-Healthcare Appointment Booking</h1>
          <p class="lead">
            A simple application to demonstrate authentication, authorization,
            and appointment booking for software testing exercises.
          </p>
          <p>
            Use the <a href="/register" id="home-register-link">Register</a> and
            <a href="/login" id="home-login-link">Login</a> buttons to get
            started.
          </p>
        </div>
        <div class="col-md-6 text-center">
          <img
            src="https://images.unsplash.com/photo-1584466977770-9f3b4b2f5b0d?auto=format&fit=crop&w=600&q=60"

          />
        </div>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
