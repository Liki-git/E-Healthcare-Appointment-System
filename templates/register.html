<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - E-Healthcare</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=2"
    />
    <style>
      body {
        background: #f4f7f9 !important;
        color: #1f2937 !important;
      }
      .form-control {
        border-radius: 6px !important;
      }
      .btn-primary {
        background-color: #0284c7 !important;
        border: none !important;
      }
    </style>
  </head>
  <body>
    <main class="content">
      <div class="container mt-4">
        <h2>Register</h2>
        <div id="messages">
          {% with messages = get_flashed_messages(with_categories=true) %} {% if
          messages %} {% for category, msg in messages %}
          <div class="alert alert-{{ category }}" role="alert">{{ msg }}</div>
          {% endfor %} {% endif %} {% endwith %}
        </div>

        <form
          id="register-form"
          method="post"
          action="/register"
          onsubmit="return validateRegister()"
        >
          <div class="mb-3">
            <label for="register-name" class="form-label">Name</label>
            <input
              type="text"
              class="form-control"
              id="register-name"
              name="name"
              required
            />
          </div>

          <div class="mb-3">
            <label for="register-email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="register-email"
              name="email"
              required
            />
          </div>

          <div class="mb-3">
            <label for="register-password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="register-password"
              name="password"
              required
              minlength="8"
            />
          </div>

          <div class="d-flex align-items-center gap-2">
            <button
              type="submit"
              class="btn btn-primary btn-sm w-100 w-sm-auto"
              id="register-submit"
            >
              <i class="bi bi-person-plus me-1"></i> Register
            </button>
            <a
              href="/login"
              class="btn btn-outline-secondary btn-sm w-100 w-sm-auto"
              >Already have an account?</a
            >
          </div>
        </form>
      </div>

      <script>
        function validateRegister() {
          const name = document.getElementById("register-name").value.trim();
          const email = document.getElementById("register-email").value.trim();
          const pw = document.getElementById("register-password").value;
          if (!name || !email || !pw) {
            alert("All fields are required.");
            return false;
          }
          // Client-side check matches server requirements
          const hasLetter = /[A-Za-z]/.test(pw);
          const hasDigit = /\d/.test(pw);
          if (pw.length < 8 || !hasLetter || !hasDigit) {
            alert(
              "Password must be at least 8 characters and include letters and numbers."
            );
            return false;
          }
          return true;
        }
      </script>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </main>
    <footer class="mt-5 py-3 bg-white border-top">
      <div class="container text-center text-muted">
        © 2025 E-Healthcare Appointment Booking System
      </div>
    </footer>
  </body>
</html>
