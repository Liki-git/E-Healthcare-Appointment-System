<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - E-Healthcare</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=3"
    />
    <style>
      body {
        background: #f4f7f9 !important;
        color: #1f2937 !important;
      }
      .form-control {
        border-radius: 6px !important;
      }
      .btn-primary {
        background-color: #0284c7 !important;
        border: none !important;
      }
    </style>
  </head>
  <body>
    <main class="content">
      <div class="container mt-4">
        <h2 style="color: #0b1a2b">Login</h2>
        <div id="messages">
          {% with messages = get_flashed_messages(with_categories=true) %} {% if
          messages %} {% for category, msg in messages %}
          <div class="alert alert-{{ category }}" role="alert">{{ msg }}</div>
          {% endfor %} {% endif %} {% endwith %}
        </div>

        <form id="login-form" method="post" action="/login">
          <div class="mb-3">
            <label for="login-email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="login-email"
              name="email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="login-password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="login-password"
              name="password"
              required
            />
          </div>
          <div class="d-flex align-items-center gap-2">
            <button
              type="submit"
              class="btn btn-primary btn-sm w-100 w-sm-auto"
              id="login-submit"
            >
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
            <a
              href="/register"
              class="btn btn-outline-secondary btn-sm w-100 w-sm-auto"
              id="login-register-link"
              ><i class="bi bi-person-plus me-1"></i> Register</a
            >
          </div>
        </form>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </main>
    <footer class="mt-5 py-3 bg-white border-top">
      <div class="container text-center text-muted">
        © 2025 E-Healthcare Appointment Booking System
      </div>
    </footer>
  </body>
</html>
