<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Appointment - E-Healthcare</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}?v=2"
    />
    <style>
      body {
        background: #f4f7f9 !important;
      }
      label.form-label {
        color: #0f172a !important;
      }
      .btn-primary {
        background-color: #0284c7 !important;
      }
    </style>
  </head>
  <body>
    <main class="content">
      <div class="container mt-4">
        <h2 style="color: #0b1a2b">Book Appointment</h2>
        <div id="messages">
          {% with messages = get_flashed_messages(with_categories=true) %} {% if
          messages %} {% for category, msg in messages %}
          <div class="alert alert-{{ category }}" role="alert">{{ msg }}</div>
          {% endfor %} {% endif %} {% endwith %}
        </div>

        <form
          id="book-form"
          method="post"
          action="/book"
          onsubmit="return validateBook()"
        >
          <div class="mb-3">
            <label for="doctor" class="form-label">Doctor</label>
            <select id="doctor" name="doctor" class="form-select" required>
              <option value="">-- Select Doctor --</option>
              {% for d in doctors %}
              <option value="{{ d.id }}">
                {{ d.name }} ({{ d.specialization }})
              </option>
              {% endfor %}
            </select>
          </div>

          <div class="mb-3">
            <label for="date" class="form-label">Date</label>
            <input
              type="date"
              id="date"
              name="date"
              class="form-control"
              required
            />
          </div>

          <div class="mb-3">
            <label for="time" class="form-label">Time</label>
            <input
              type="time"
              id="time"
              name="time"
              class="form-control"
              required
            />
          </div>

          <div class="mb-3">
            <label for="book-reason" class="form-label">Reason / Notes</label>
            <textarea
              id="book-reason"
              name="reason"
              class="form-control"
              rows="3"
              placeholder="Brief reason for visit (optional)"
            ></textarea>
          </div>

          <div class="mb-3">
            <label for="book-phone" class="form-label">Contact Phone</label>
            <input
              type="tel"
              id="book-phone"
              name="phone"
              class="form-control"
              placeholder="Optional phone number"
            />
          </div>

          <div
            class="d-flex flex-column flex-sm-row gap-2 align-items-center mt-3"
          >
            <button
              type="submit"
              class="btn btn-primary btn-sm w-100 w-sm-auto"
              id="submit-book"
            >
              <i class="bi bi-journal-plus me-1"></i> Book
            </button>
            <a
              href="/dashboard"
              class="btn btn-outline-secondary btn-sm w-100 w-sm-auto ms-sm-2"
              ><i class="bi bi-arrow-left me-1"></i> Back</a
            >
          </div>
        </form>
      </div>

      <script>
        function validateBook() {
          const doctor = document.getElementById("doctor").value;
          const dateVal = document.getElementById("date").value;
          const timeVal = document.getElementById("time").value;
          const phone = document.getElementById("book-phone").value.trim();
          if (!doctor || !dateVal || !timeVal) {
            alert("All fields are required.");
            return false;
          }
          const selected = new Date(dateVal + "T" + timeVal);
          const now = new Date();
          if (selected < now) {
            alert("Cannot book a past date/time.");
            return false;
          }
          // optional phone validation (if provided)
          if (phone && !/^\+?[0-9 \-()]{7,20}$/.test(phone)) {
            alert("Please enter a valid phone number or leave it blank.");
            return false;
          }
          return true;
        }
      </script>

      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </main>
    <footer class="mt-5 py-3 bg-white border-top">
      <div class="container text-center text-muted">
        © 2025 E-Healthcare Appointment Booking System
      </div>
    </footer>
  </body>
</html>
